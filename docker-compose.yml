services:
  postgres:
    image: postgres:16-alpine
    container_name: nest-pos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nestpos
      POSTGRES_PASSWORD: nestpos_dev_password
      POSTGRES_DB: nestpos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nest-pos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
